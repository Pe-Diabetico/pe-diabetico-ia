# =============================================================================
#  PÉ DIABÉTICO IA — ARQUIVO DE CONFIGURAÇÃO CENTRAL
#  Lido por: modelo/target_engine.py  E  modelo/exportar_modelo_esp32.py
#
#  Altere os valores aqui. Nenhum outro arquivo precisa ser tocado.
#
#  SISTEMA DE ZONAS:
#    verde:    faixa segura — sem alerta
#    amarelo:  atenção — monitorar de perto
#    vermelho: risco — alertar profissional
# =============================================================================


# -----------------------------------------------------------------------------
#  1. FEATURES DE SENSOR — LIMIARES POR ZONA
#
#  Referências:
#    Pressão  → IWGDF Guidelines / Borges (2023)
#    Temp.    → IWGDF: assimetria >= 2.2°C; temperatura absoluta >= 33.5°C
#    Umidade  → Lourenço (2018): microclima normal 50–70% dentro do calçado
#               Kosaji et al. (2025): maceração > 75%, ressecamento < 30%
# -----------------------------------------------------------------------------

sensores:

  pressao_maxima_kpa:
    label: "Pressão Plantar Máxima"
    unidade: "kPa"
    # IWGDF: >= 196 kPa (~2 kgf/cm²) indica risco de lesão tecidual
    verde:    [0,    149]
    amarelo:  [150,  195]
    vermelho: [196,  null]
    quanto_maior_pior: true

  temperatura_max_c:
    label: "Temperatura do Pé"
    unidade: "°C"
    # Acima de 33.5°C pode indicar inflamação localizada.
    # Referência ideal: assimetria entre os dois pés >= 2.2°C (IWGDF),
    # mas como o protótipo usa um sensor por palmilha, usa-se valor absoluto.
    verde:    [0,    32.9]
    amarelo:  [33.0, 33.4]
    vermelho: [33.5, null]
    quanto_maior_pior: true

  umidade_pct:
    label: "Umidade dentro do Calçado"
    unidade: "%"
    # Microclima interno do calçado — sensor DHT22 na palmilha.
    # Risco nos DOIS extremos (lógica especial no código):
    #   Ressecamento: pele seca → fissuras → porta de entrada para infecção
    #   Maceração:    excesso de umidade → amolecimento da pele → lesões
    zona_especial: true
    seguro_min:  40    # abaixo → atenção para ressecamento
    seguro_max:  60    # acima  → atenção para maceração
    atencao_min: 30    # abaixo → risco de ressecamento grave
    atencao_max: 75    # acima  → risco de maceração
    # Zonas resultantes:
    #   < 30%       → vermelho  (ressecamento grave)
    #   30% – 39%   → amarelo   (atenção ressecamento)
    #   40% – 60%   → verde     (faixa ideal)
    #   61% – 75%   → amarelo   (atenção maceração)
    #   > 75%       → vermelho  (maceração)
    unidade: "%"
    quanto_maior_pior: false


# -----------------------------------------------------------------------------
#  2. FEATURES CLÍNICAS — LIMIARES E PESOS DE RISCO
#     Usados pelo target_engine.py para calcular o score.
# -----------------------------------------------------------------------------

clinicos:

  pressao_arterial:
    label: "Hipertensão (HAS)"
    tipo: binario        # 0 = não / 1 = sim
    peso_risco: 1        # prevalência 81.5% em pacientes com pé diabético
                         # Tavares et al. (2016)

  tabagismo:
    label: "Tabagismo"
    tipo: binario
    peso_risco: 2        # associação estatística p=0.010 — Tavares et al. (2016)

  hba1c_pct:
    label: "Hemoglobina Glicada (HbA1c)"
    unidade: "%"
    # Controle glicêmico médio dos últimos 3 meses
    verde:    [0,   6.9]
    amarelo:  [7.0, 7.9]
    vermelho: [8.0, null]
    peso_risco_amarelo:  1
    peso_risco_vermelho: 2

  anos_diabetes:
    label: "Tempo de Diagnóstico do Diabetes"
    unidade: "anos"
    # Após 10 anos: risco de neuropatia e vasculopatia aumenta
    # Após 15 anos: risco severo — Chauhan (2023)
    verde:    [0,  9]
    amarelo:  [10, 14]
    vermelho: [15, null]
    peso_risco_amarelo:  1
    peso_risco_vermelho: 2

  imc:
    label: "Índice de Massa Corporal (IMC)"
    unidade: "kg/m²"
    # IMC médio do grupo com complicações: 31.8 kg/m²
    # Castillo-Morquecho (2024)
    verde:    [0,    24.9]
    amarelo:  [25.0, 29.9]
    vermelho: [30.0, null]
    peso_risco_amarelo:  0
    peso_risco_vermelho: 1

  idade_anos:
    label: "Idade"
    unidade: "anos"
    # Pico de risco entre 60–79 anos — Tavares et al. (2016)
    verde:    [0,  59]
    amarelo:  [60, 79]
    vermelho: [80, null]
    peso_risco_amarelo:  1
    peso_risco_vermelho: 1


# -----------------------------------------------------------------------------
#  3. SCORE DE RISCO — target_engine.py
#     Cada feature contribui com pontos conforme a zona.
#     Se score_total >= limiar_alto_risco → risco_ulcera = 1
# -----------------------------------------------------------------------------

score:
  # Sensores
  pressao_amarelo:      1
  pressao_vermelho:     3
  temperatura_amarelo:  1
  temperatura_vermelho: 2
  umidade_fora_faixa:   1    # qualquer zona amarela ou vermelha de umidade

  # Limiar de classificação
  # Aumente para ser mais conservador (menos alertas)
  # Diminua para ser mais sensível (mais alertas)
  limiar_alto_risco: 5


# -----------------------------------------------------------------------------
#  4. RANDOM FOREST — exportar_modelo_esp32.py
# -----------------------------------------------------------------------------

random_forest:
  n_estimators:     20      # reduzido para caber no ESP32 (520 KB RAM)
  max_depth:        10      # adequado para 11 features
  min_samples_leaf: 3       # evita overfitting
  max_features:     "sqrt"
  class_weight:     "balanced"
  random_state:     42